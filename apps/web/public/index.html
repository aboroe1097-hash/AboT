<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AboT v0.01</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">A</div>
          <div>
            <div class="brand-title">AboT</div>
            <div id="health-line" class="muted">Starting</div>
          </div>
        </div>
        <div class="topbar-actions">
          <span id="api-pill" class="status-pill warn">API</span>
          <button id="theme-toggle" class="ghost-button" type="button">Theme</button>
          <button id="refresh-all" class="ghost-button" type="button">Refresh</button>
        </div>
      </header>

      <main class="workspace">
        <section class="task-pane" aria-label="Task terminal">
          <section id="chat-feed" class="terminal-feed" aria-live="polite"></section>

          <form id="chat-form" class="task-composer">
            <textarea id="task" rows="4" placeholder="Task"></textarea>
            <div class="composer-row">
              <label class="inline-field">
                <span>Mode</span>
                <select id="run-mode">
                  <option value="orchestrated">Orchestrated</option>
                  <option value="fixed_agent">Fixed agent</option>
                </select>
              </label>
              <label class="execute-toggle">
                <input id="execute-task" type="checkbox" />
                <span>Execute</span>
              </label>
              <button id="route-button" type="button">Route</button>
              <button id="chat-button" class="primary-button" type="submit">Send</button>
            </div>

            <details class="advanced-box">
              <summary>Advanced</summary>
              <div class="advanced-grid">
                <label>
                  <span>Fixed Agent</span>
                  <select id="fixed-agent"></select>
                </label>
                <label>
                  <span>Diff Lines</span>
                  <input id="diff-lines" type="number" min="0" value="0" />
                </label>
                <label>
                  <span>Open Files</span>
                  <textarea id="open-files" rows="3"></textarea>
                </label>
                <label>
                  <span>Changed Files</span>
                  <textarea id="changed-files" rows="3"></textarea>
                </label>
              </div>
            </details>
          </form>
        </section>

        <aside class="side-rail" aria-label="Controls">
          <section class="panel project-panel">
            <div class="panel-head">
              <h2>Folder</h2>
              <button id="refresh-projects" type="button">Refresh</button>
            </div>
            <div id="active-project" class="project-current">AboT</div>
            <details class="panel-details">
              <summary>Change Folder</summary>
              <form id="project-form" class="stack-form">
                <input id="project-name" name="name" autocomplete="off" placeholder="Name" />
                <input id="project-root" name="rootPath" autocomplete="off" placeholder="Root path" />
                <button type="submit">Use Folder</button>
              </form>
            </details>
            <div id="project-list" class="project-list"></div>
          </section>

          <section class="panel api-panel">
            <div class="panel-head">
              <h2>API</h2>
              <button id="confirm-api" type="button">Confirm</button>
            </div>
            <div id="setup-status" class="setup-status"></div>
            <details class="panel-details">
              <summary>Edit API</summary>
              <form id="api-setup-form" class="stack-form">
                <label>
                  <span>Router</span>
                  <select id="router-provider">
                    <option value="gemini">Gemini</option>
                    <option value="openai-compatible">OpenAI-compatible</option>
                  </select>
                </label>
                <label>
                  <span>Router Model</span>
                  <input id="router-model" autocomplete="off" placeholder="gemini-3.1-flash-lite" />
                </label>
                <label id="router-base-url-row">
                  <span>Router Base URL</span>
                  <input id="router-base-url" autocomplete="off" placeholder="https://api.openai.com/v1" />
                </label>
                <label>
                  <span>Router API Key</span>
                  <input id="router-api-key" type="password" autocomplete="off" placeholder="Leave blank to keep current" />
                </label>
                <label>
                  <span>Execution Provider</span>
                  <select id="execution-provider">
                    <option value="auto">Auto: Codex + Gemini</option>
                    <option value="codex-cli">Codex login</option>
                    <option value="gemini">Gemini</option>
                    <option value="openai">OpenAI</option>
                    <option value="openrouter">OpenRouter</option>
                    <option value="opencode-go">opencode-go</option>
                  </select>
                </label>
                <label>
                  <span>Execution Model</span>
                  <input id="execution-model" autocomplete="off" placeholder="gemini-3.1-flash-lite" />
                </label>
                <label id="execution-api-key-row">
                  <span>Execution API Key</span>
                  <input id="execution-api-key" type="password" autocomplete="off" placeholder="Leave blank to keep current" />
                </label>
                <label id="opencode-go-row">
                  <span>opencode-go Base URL</span>
                  <input id="opencode-go-base-url" autocomplete="off" placeholder="http://127.0.0.1:11434/v1" />
                </label>
                <label>
                  <span>OpenAgent Config</span>
                  <input id="openagent-config" autocomplete="off" placeholder="C:\Users\you\.config\opencode\oh-my-openagent.json" />
                </label>
                <button id="save-api" class="primary-button" type="submit">Save Locally</button>
              </form>
            </details>
          </section>

          <section class="panel terminal-panel">
            <div class="panel-head">
              <h2>Terminal</h2>
              <div class="button-row">
                <button id="copy-command-output" type="button">Copy</button>
                <button id="run-command" type="button">Run</button>
              </div>
            </div>
            <input id="command-input" autocomplete="off" placeholder="npm run qa" />
            <pre id="command-output" class="command-output"></pre>
          </section>

          <section class="panel logs-panel">
            <div class="panel-head">
              <h2>Logs</h2>
              <div class="button-row">
                <button id="export-json" type="button">JSON</button>
                <button id="export-csv" type="button">CSV</button>
                <button id="refresh-routes" type="button">Refresh</button>
              </div>
            </div>
            <input id="route-filter" class="route-filter" autocomplete="off" placeholder="Filter" />
            <div id="routes-list" class="routes-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <div id="toast-region" class="toast-region" aria-live="polite" aria-atomic="true"></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
